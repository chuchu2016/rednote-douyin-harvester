<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书抖音整理助手 - 设置</title>
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <img src="icons/icon128.png" alt="" class="app-mark" aria-hidden="true">
            <h1 class="header__title">小红书抖音整理助手设置</h1>
            <p class="header__subtitle">配置飞书应用信息，让可见作品链接与点赞数统一入库</p>
        </header>

        <form class="form" id="settingsForm">
            <div class="form-group">
                <label class="form-label" for="appId">飞书 App ID</label>
                <input type="text" class="form-input" id="appId" placeholder="cli_xxxxxxxxxx" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="appSecret">飞书 App Secret</label>
                <input type="password" class="form-input" id="appSecret" placeholder="••••••••••••" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="baseId">表格 Base ID</label>
                <input type="text" class="form-input" id="baseId" placeholder="EzQLbxxxxxx" required>
                <p class="form-hint">多维表格 URL 中 /base/ 后面的部分</p>
            </div>

            <div class="form-group">
                <label class="form-label" for="tableId">表格 Table ID</label>
                <input type="text" class="form-input" id="tableId" placeholder="tbljIxxxxxx" required>
                <p class="form-hint">多维表格 URL 中 table= 后面的部分</p>
            </div>

            <button type="submit" class="save-btn" id="saveBtn">
                保存配置
            </button>

            <div class="status" id="status"></div>
            <p class="form-hint">飞书配置仅保存在当前浏览器本地。建议使用专用飞书自建应用，不要复用高权限应用。</p>
        </form>

        <section class="help">
            <h2 class="help__title">飞书表格字段要求</h2>
            <p class="help__desc">请确保你的飞书表格包含以下字段：</p>
            <table class="field-table">
                <thead>
                    <tr>
                        <th>字段名</th>
                        <th>类型</th>
                        <th>说明</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>视频标题</td>
                        <td>文本</td>
                        <td>作品或视频描述文案</td>
                    </tr>
                    <tr>
                        <td>视频链接</td>
                        <td>链接</td>
                        <td>作品或视频详情页 URL</td>
                    </tr>
                    <tr>
                        <td>博主名称</td>
                        <td>文本</td>
                        <td>作者昵称</td>
                    </tr>
                    <tr>
                        <td>博主主页</td>
                        <td>链接</td>
                        <td>作者主页 URL</td>
                    </tr>
                    <tr>
                        <td>点赞数</td>
                        <td>数字</td>
                        <td>点赞量</td>
                    </tr>
                    <tr>
                        <td>整理时间</td>
                        <td>日期</td>
                        <td>信息整理时间</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

    <script src="options.js"></script>
</body>

</html>
