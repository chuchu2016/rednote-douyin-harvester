<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书抖音整理助手</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

        <!-- 头部 -->
        <header class="header">
            <img src="icons/icon128.png" alt="" class="app-mark" aria-hidden="true">
            <div class="header__copy">
                <h1 class="header__title">小红书抖音整理助手</h1>
                <p class="header__subtitle">请进入博主主页，整理可见作品点赞数</p>
            </div>
        </header>

        <!-- 页面状态 -->
        <section class="page-status" id="pageStatus">
            <div class="page-status__content">
                <div class="page-status__title" id="statusTitle">检测页面中...</div>
                <div class="page-status__desc" id="statusDesc"></div>
            </div>
        </section>

            <div class="not-supported__links">
                <a href="https://www.douyin.com/" target="_blank" class="not-supported__link" id="openDouyinLink">打开抖音</a>
                <a href="https://www.xiaohongshu.com/" target="_blank" class="not-supported__link" id="openXhsLink">打开小红书</a>
            </div>
        </div>

        <!-- 操作面板 -->
        <section class="panel" id="mainPanel" style="display: none;">
            <!-- 筛选条件 -->
            <div class="filter">
                <label class="filter__label" for="likeThreshold">
                    最低点赞数筛选
                </label>
                <div class="filter__input-wrap">
                    <input type="number" class="filter__input" id="likeThreshold" placeholder="留空则不筛选" min="0" step="1">
                    <span class="filter__hint">只能输入正整数</span>
                </div>
            </div>

            <!-- 开始筛选按钮 -->
            <button class="action-btn action-btn--primary" id="extractBtn">
                <span>开始整理</span>
            </button>

            <!-- 结果区域 -->
            <div class="results" id="resultsArea" style="display: none;">
                <div class="results__header">
                    <span class="results__title">
                        整理结果
                    </span>
                    <span class="results__count" id="resultsCount">0 条</span>
                </div>
                <div class="results__list" id="resultsList"></div>
            </div>

            <!-- 状态提示 -->
            <div class="status" id="status"></div>

            <!-- 结果操作 -->
            <div class="action-row" id="actionRow" style="display: none;">
                <button class="action-btn action-btn--result" id="exportBtn">
                    <span>导出 Excel</span>
                </button>

                <button class="action-btn action-btn--result" id="saveBtn">
                    <span>保存到飞书表格</span>
                </button>
            </div>
        </section>

        <!-- 底部设置入口 -->
        <footer class="footer">
            <a href="feedback.html" target="_blank" class="footer__link footer__link--feedback">用户反馈</a>
            <span class="footer__divider">|</span>
            <a href="options.html" target="_blank" class="footer__link">设置</a>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>

</html>
