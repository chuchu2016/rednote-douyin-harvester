<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <title>用户反馈 - 小红书抖音整理助手</title>
    <link rel="stylesheet" href="feedback.css">
</head>

<body>
    <div class="container">
        <header class="header">

            <h1 class="header__title">用户反馈</h1>
